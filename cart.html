<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <title>Shopping Cart - Amazon Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <button class="mobile-menu-btn" aria-label="Menu">&#9776;</button>
        <a href="index.html">
            <img src="assets/amazon_logo.png" width="100px" alt="Amazon Logo">
        </a>
        <div class="nav-country">
            <img src="assets/location_icon.png" height="20px" alt="">
            <div>
                <p>Deliver to</p>
                <h1>Bangladesh</h1>
            </div>
        </div>
        <div class="nav-search">
            <div class="nav-search-gategory">
                <p>All</p>
                <img src="assets/dropdown_icon.png" height="12px" alt="">
            </div>
            <input type="text" class="nav-search-input" placeholder="Search Amazon" />
            <img src="assets/search_icon.png" class="nav-search-icon" alt="Search">
        </div>

        <div class="nav-language">
            <img src="assets/us_flag.png" width="25px" alt="">
            <p>EN</p>
            <img src="assets/dropdown_icon.png" height="8px" alt="">
        </div>

        <div class="nav-text">
            <p class="sign-in-text">Hello, Sign in</p>
            <h1>Account & Lists <img src="assets/dropdown_icon.png" height="8px" alt=""> </h1>
        </div>

        <div class="nav-text">
            <p>Return</p>
            <h1>& Orders</h1>
        </div>

        <a href="cart.html" class="nav-cart">
            <img src="assets/cart_icon.png" width="35px" alt="">
            <span class="cart-badge">0</span>
            <p>Cart</p>
        </a>
    </nav>

    <div class="nav-bottom">
        <div>
            <img src="assets/menu_icon.png" width="25px" alt="">
            <p>All</p>
        </div>
        <p>Today's Deals</p>
        <p>Customer Service</p>
        <p>Gift Cards</p>
        <p>Registry</p>
        <p>Sell</p>
    </div>

    <div class="cart-page">
        <div class="cart-page-main">
            <div class="cart-page-header">
                <h1>Shopping Cart</h1>
                <p class="cart-deselect">Deselect all items</p>
                <p class="cart-price-label">Price</p>
            </div>
            <hr>
            <div class="cart-page-items" id="cart-items-container">
            </div>
        </div>
        <div class="cart-page-sidebar">
            <div class="cart-subtotal">
                <p>Subtotal (<span id="cart-count">0</span> items): <strong>$<span id="cart-subtotal-price">0.00</span></strong></p>
                <label class="cart-gift-label">
                    <input type="checkbox"> This order contains a gift
                </label>
                <a href="checkout.html" class="btn-checkout">Proceed to Checkout</a>
            </div>
        </div>
    </div>

    <footer>
        <img src="assets/amazon_logo.png" width="100px" alt="">
        <p>&copy;1996-2024, Amazon.com, Inc. or its affiliates</p>
    </footer>

    <button class="back-to-top" aria-label="Back to top">&#8593;</button>

    <script src="cart-page.js"></script>
</body>
</html>
